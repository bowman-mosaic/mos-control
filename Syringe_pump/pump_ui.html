<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Syringe Pump Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:         #0c0f14;
  --surface:    rgba(255,255,255,.04);
  --card:       rgba(255,255,255,.06);
  --card-hover: rgba(255,255,255,.08);
  --accent:     #6c63ff;
  --accent-glow:rgba(108,99,255,.25);
  --green:      #34d399;
  --green-glow: rgba(52,211,153,.2);
  --red:        #f87171;
  --red-glow:   rgba(248,113,113,.2);
  --amber:      #fbbf24;
  --text:       #e8eaed;
  --text2:      #9aa0a6;
  --text3:      #5f6368;
  --border:     rgba(255,255,255,.08);
  --input-bg:   rgba(255,255,255,.05);
  --input-border:rgba(255,255,255,.1);
  --radius:     12px;
  --radius-sm:  8px;
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg); color:var(--text);
  font-size:13px; line-height:1.5;
}

/* ── layout ── */
.topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 24px; border-bottom:1px solid var(--border);
  background:rgba(255,255,255,.02); backdrop-filter:blur(20px);
}
.topbar h1 { font-size:17px; font-weight:700; display:flex; align-items:center; gap:10px; }
.topbar .logo {
  width:32px;height:32px;border-radius:8px;background:var(--accent);
  display:flex;align-items:center;justify-content:center;font-size:15px;
}
.top-right { display:flex; align-items:center; gap:12px; }
.indicators { display:flex; gap:8px; }
.ind { display:flex; align-items:center; gap:4px; font-size:11px; font-weight:600; color:var(--text3); }
.ind .dot { width:8px;height:8px;border-radius:50%;background:var(--text3); transition:all .2s; }
.ind.on .dot { background:var(--green); box-shadow:0 0 6px var(--green-glow); }
.ind.on { color:var(--green); }

.main { padding:16px 20px; }
.pump-grid {
  display:grid; grid-template-columns:repeat(auto-fill, minmax(300px,1fr));
  gap:12px;
}

/* ── buttons ── */
.btn {
  display:inline-flex; align-items:center; justify-content:center; gap:4px;
  padding:6px 14px; border-radius:6px; font-size:12px; font-weight:500;
  font-family:inherit; border:1px solid var(--border); cursor:pointer;
  background:var(--card); color:var(--text); transition:all .15s;
}
.btn:hover { background:var(--card-hover); border-color:rgba(255,255,255,.15); transform:translateY(-1px); }
.btn:active { transform:translateY(0); }
.btn:disabled { opacity:.35; cursor:not-allowed; transform:none; }
.btn.accent { background:var(--accent); border-color:var(--accent); color:#fff; }
.btn.accent:hover { box-shadow:0 4px 16px var(--accent-glow); }
.btn.green { background:var(--green); border-color:var(--green); color:#111; font-weight:600; }
.btn.green:hover { box-shadow:0 4px 16px var(--green-glow); }
.btn.red { background:var(--red); border-color:var(--red); color:#111; font-weight:600; }
.btn.red:hover { box-shadow:0 4px 16px var(--red-glow); }
.btn-sm { padding:4px 10px; font-size:11px; }
.btn-row { display:flex; flex-wrap:wrap; gap:5px; margin-top:6px; }

/* ── inputs ── */
input,select {
  font-family:inherit; font-size:12px; color:var(--text);
  background:var(--input-bg); border:1px solid var(--input-border);
  padding:5px 8px; border-radius:6px; outline:none; transition:border-color .15s;
}
input:focus,select:focus { border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-glow); }
input[type=number] { width:64px; }
select { min-width:74px; cursor:pointer; }
option { background:#1a1d24; }

/* ── cards ── */
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); overflow:hidden; transition:border-color .2s;
}
.card:hover { border-color:rgba(255,255,255,.12); }
.card.connected { border-color:rgba(52,211,153,.3); }
.card-head {
  padding:10px 14px; display:flex; align-items:center;
  justify-content:space-between; border-bottom:1px solid var(--border);
  background:var(--card);
}
.card-head .title { font-size:13px; font-weight:700; }
.badge {
  font-size:10px; font-weight:600; text-transform:uppercase;
  letter-spacing:.5px; padding:3px 8px; border-radius:20px;
  background:rgba(255,255,255,.06); color:var(--text3);
}
.badge.on { background:var(--green-glow); color:var(--green); }

.section { padding:10px 14px; border-top:1px solid var(--border); }
.section-label {
  font-size:10px; font-weight:700; text-transform:uppercase;
  letter-spacing:.8px; color:var(--text3); margin-bottom:8px;
}
.field { display:flex; align-items:center; gap:6px; margin-bottom:6px; }
.field label { font-size:12px; color:var(--text2); min-width:58px; font-weight:500; }

/* ── protocol table ── */
.proto-wrap {
  border:1px solid var(--border); border-radius:var(--radius-sm);
  overflow:hidden; margin-bottom:8px;
}
.proto-table { width:100%; border-collapse:collapse; font-size:11px; }
.proto-table th {
  background:var(--card); color:var(--text3); padding:6px 8px;
  text-align:left; font-weight:600; font-size:10px;
  text-transform:uppercase; letter-spacing:.5px;
}
.proto-table td { padding:5px 8px; border-top:1px solid var(--border); }
.proto-table tbody tr { cursor:pointer; transition:background .1s; }
.proto-table tbody tr:hover { background:rgba(255,255,255,.03); }
.proto-table tbody tr.selected { background:rgba(248,113,113,.1); }
.proto-table tbody tr.active { background:rgba(108,99,255,.15); }
.tag { display:inline-block; padding:1px 6px; border-radius:4px; font-size:10px; font-weight:600; }
.tag-run { background:rgba(52,211,153,.15); color:var(--green); }
.tag-stop { background:rgba(248,113,113,.15); color:var(--red); }
.proto-empty { padding:12px; text-align:center; color:var(--text3); font-size:11px; }
.proto-status { font-size:11px; color:var(--accent); margin-top:6px; min-height:16px; }

/* ── time inputs ── */
.time-group { display:flex; align-items:center; gap:2px; }
.time-group input { width:36px; text-align:center; padding:5px 2px; }
.time-group .sep { color:var(--text3); font-weight:700; font-size:14px; }

/* ── log ── */
.log-panel {
  margin-top:16px; background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); max-height:220px; overflow-y:auto;
  font-family:'Cascadia Code','Fira Code',monospace; font-size:12px;
}
.log-entry { padding:4px 14px; border-bottom:1px solid rgba(255,255,255,.03); display:flex; gap:10px; }
.log-time { color:var(--text3); font-size:11px; flex-shrink:0; min-width:60px; }
.log-msg { color:var(--text2); word-break:break-word; }

/* ── toasts ── */
#toasts { position:fixed; bottom:20px; right:20px; z-index:999; display:flex; flex-direction:column-reverse; gap:8px; }
.toast {
  padding:10px 16px; border-radius:8px; font-size:12px; font-weight:500;
  background:#1e2028; border:1px solid var(--border); color:var(--text);
  box-shadow:0 8px 32px rgba(0,0,0,.4); animation:slideIn .25s ease; max-width:380px;
}
.toast.error { border-color:rgba(248,113,113,.3); color:var(--red); }
.toast.success { border-color:rgba(52,211,153,.3); color:var(--green); }
@keyframes slideIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<header class="topbar">
  <h1><span class="logo">&#9879;</span> Syringe Pump Control</h1>
  <div class="top-right">
    <div class="indicators">
      <span class="ind" id="ind0"><span class="dot"></span>P1</span>
      <span class="ind" id="ind1"><span class="dot"></span>P2</span>
      <span class="ind" id="ind2"><span class="dot"></span>P3</span>
      <span class="ind" id="ind3"><span class="dot"></span>P4</span>
    </div>
    <button class="btn btn-sm accent" onclick="refreshPorts()">Refresh Ports</button>
  </div>
</header>

<div class="main">
  <div class="pump-grid" id="pumpGrid"></div>
  <div class="log-panel" id="logPanel"></div>
</div>

<div id="toasts"></div>

<script>
const N = 4;
const UNITS = ["ML/MIN","ML/HR","UL/MIN","UL/HR"];
let ports = [];
let pumps = Array.from({length:N}, ()=>({connected:false, steps:[], selRow:-1, protoRunning:false}));

/* ── helpers ── */
async function api(endpoint, body={}) {
  const r = await fetch('/api/' + endpoint, {
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
  });
  return r.json();
}
function toast(msg, type="info") {
  const el = document.createElement("div");
  el.className = "toast" + (type==="error"?" error":type==="success"?" success":"");
  el.textContent = msg;
  document.getElementById("toasts").appendChild(el);
  setTimeout(()=>{ el.style.opacity="0"; setTimeout(()=>el.remove(),300); },3500);
}
function pad2(n){ return String(Math.max(0,Math.floor(n))).padStart(2,"0"); }
function now(){ return new Date().toLocaleTimeString("en-GB",{hour12:false}); }

function log(msg) {
  const c = document.getElementById("logPanel");
  const e = document.createElement("div"); e.className="log-entry";
  e.innerHTML = `<span class="log-time">${now()}</span><span class="log-msg">${msg}</span>`;
  c.appendChild(e);
  c.scrollTop = c.scrollHeight;
  if(c.children.length > 200) c.removeChild(c.firstChild);
}

function updateIndicators() {
  for(let i=0;i<N;i++) document.getElementById("ind"+i).classList.toggle("on", pumps[i].connected);
}

/* ── build cards ── */
function buildPumps() {
  const grid = document.getElementById("pumpGrid");
  for(let i=0;i<N;i++) grid.innerHTML += pumpHTML(i);
}

function pumpHTML(i) {
  const units = UNITS.map(u=>`<option>${u}</option>`).join("");
  return `
  <div class="card" id="pump${i}">
    <div class="card-head">
      <span class="title">Pump ${i+1}</span>
      <span class="badge" id="badge${i}">Offline</span>
    </div>
    <div class="section">
      <div class="section-label">Connection</div>
      <div class="field">
        <label>Port</label><select id="port${i}" style="flex:1"></select>
      </div>
      <div class="field">
        <label>Address</label>
        <input type="number" id="addr${i}" value="${i}" min="0" max="9" style="width:50px">
      </div>
      <div class="btn-row">
        <button class="btn green btn-sm" id="conn${i}" onclick="doConnect(${i})">Connect</button>
        <button class="btn red btn-sm" id="disc${i}" onclick="doDisconnect(${i})" disabled>Disconnect</button>
      </div>
    </div>
    <div class="section">
      <div class="section-label">Syringe</div>
      <div class="field">
        <label>Diameter</label>
        <input type="number" id="dia${i}" value="14.5" step="0.1">
        <span style="color:var(--text3);font-size:11px">mm</span>
        <button class="btn btn-sm" onclick="setDia(${i})">Set</button>
      </div>
      <div class="field">
        <label>Direction</label>
        <select id="dir${i}"><option>INF</option><option>WDR</option></select>
        <button class="btn btn-sm" onclick="setDir(${i})">Set</button>
      </div>
    </div>
    <div class="section">
      <div class="section-label">Manual Control</div>
      <div class="field">
        <label>Rate</label>
        <input type="number" id="rate${i}" value="5" step="0.1">
        <select id="rateU${i}">${units}</select>
        <button class="btn btn-sm" onclick="setRate(${i})">Set</button>
      </div>
      <div class="field">
        <label>Volume</label>
        <input type="number" id="vol${i}" value="1" step="0.1">
        <span style="color:var(--text3);font-size:11px">mL</span>
        <button class="btn btn-sm" onclick="setVol(${i})">Set</button>
      </div>
      <div class="btn-row">
        <button class="btn green btn-sm" onclick="doRun(${i})">Run</button>
        <button class="btn red btn-sm" onclick="doStop(${i})">Stop</button>
        <button class="btn btn-sm" onclick="clrVol(${i})">Clr Vol</button>
        <button class="btn btn-sm" onclick="clrTgt(${i})">Clr Tgt</button>
        <button class="btn btn-sm" onclick="doStatus(${i})">Status</button>
      </div>
    </div>
    <div class="section">
      <div class="section-label">Protocol</div>
      <div class="proto-wrap">
        <table class="proto-table">
          <thead><tr><th>Action</th><th>Rate</th><th>Units</th><th>Time</th></tr></thead>
          <tbody id="protoBody${i}"></tbody>
        </table>
        <div class="proto-empty" id="protoEmpty${i}">No steps</div>
      </div>
      <div class="field">
        <select id="pAct${i}"><option>Run</option><option>Stop</option></select>
        <input type="number" id="pRate${i}" placeholder="Rate" step="0.1" style="width:54px">
        <select id="pU${i}">${units}</select>
      </div>
      <div class="field">
        <label>Time</label>
        <div class="time-group">
          <input type="number" id="pHH${i}" value="0" min="0" max="99">
          <span class="sep">:</span>
          <input type="number" id="pMM${i}" value="0" min="0" max="59">
          <span class="sep">:</span>
          <input type="number" id="pSS${i}" value="0" min="0" max="59">
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-sm" onclick="protoAdd(${i})">Add</button>
        <button class="btn btn-sm" onclick="protoRemove(${i})">Remove</button>
        <button class="btn accent btn-sm" id="protoRun${i}" onclick="protoRun(${i})">Run Proto</button>
        <button class="btn red btn-sm" id="protoStop${i}" onclick="protoStop(${i})" disabled>Stop Proto</button>
      </div>
      <div class="btn-row">
        <button class="btn btn-sm" onclick="protoSave(${i})">Save</button>
        <button class="btn btn-sm" onclick="protoLoad(${i})">Load</button>
      </div>
      <div class="proto-status" id="protoStat${i}"></div>
    </div>
  </div>`;
}

/* ── ports ── */
async function refreshPorts() {
  const r = await api('ports');
  if(r.error){ toast(r.error,"error"); return; }
  ports = r;
  const names = r.map(p=>p.device);
  for(let i=0;i<N;i++){
    const sel = document.getElementById("port"+i);
    const cur = sel.value;
    sel.innerHTML = names.map(n=>`<option>${n}</option>`).join("");
    if(cur && names.includes(cur)) sel.value = cur;
  }
  toast("Ports: " + (names.join(", ") || "none found"), names.length ? "success" : "error");
  log("Serial ports refreshed: " + (names.join(", ") || "none"));
}

/* ── connection ── */
async function doConnect(i) {
  const port = document.getElementById("port"+i).value;
  const addr = parseInt(document.getElementById("addr"+i).value);
  if(!port){ toast("Select a port","error"); return; }
  const r = await api('connect', {pump:i, port, address:addr});
  if(r.error){ toast("P"+(i+1)+": "+r.error,"error"); log("P"+(i+1)+" connect failed: "+r.error); return; }
  pumps[i].connected = true;
  document.getElementById("pump"+i).classList.add("connected");
  document.getElementById("badge"+i).className="badge on";
  document.getElementById("badge"+i).textContent="Online";
  document.getElementById("conn"+i).disabled=true;
  document.getElementById("disc"+i).disabled=false;
  updateIndicators();
  toast("P"+(i+1)+" connected","success");
  log("P"+(i+1)+" connected on "+port+" addr "+addr);
}

async function doDisconnect(i) {
  await api('disconnect', {pump:i});
  pumps[i].connected=false; pumps[i].protoRunning=false;
  document.getElementById("pump"+i).classList.remove("connected");
  document.getElementById("badge"+i).className="badge";
  document.getElementById("badge"+i).textContent="Offline";
  document.getElementById("conn"+i).disabled=false;
  document.getElementById("disc"+i).disabled=true;
  updateIndicators();
  toast("P"+(i+1)+" disconnected");
  log("P"+(i+1)+" disconnected");
}

/* ── pump commands ── */
async function setDia(i) {
  const v = parseFloat(document.getElementById("dia"+i).value);
  const r = await api('set_diameter', {pump:i, value:v});
  if(r.error) toast("P"+(i+1)+": "+r.error,"error");
  else { toast("P"+(i+1)+": diameter "+v+"mm","success"); log("P"+(i+1)+" diameter="+v+"mm"); }
}
async function setDir(i) {
  const v = document.getElementById("dir"+i).value;
  const r = await api('set_direction', {pump:i, value:v});
  if(r.error) toast("P"+(i+1)+": "+r.error,"error");
  else { toast("P"+(i+1)+": direction="+v,"success"); log("P"+(i+1)+" direction="+v); }
}
async function setRate(i) {
  const rate = parseFloat(document.getElementById("rate"+i).value);
  const units = document.getElementById("rateU"+i).value;
  const r = await api('set_rate', {pump:i, rate, units});
  if(r.error) toast("P"+(i+1)+": "+r.error,"error");
  else { toast("P"+(i+1)+": rate set","success"); log("P"+(i+1)+" rate="+rate+" "+units); }
}
async function setVol(i) {
  const v = parseFloat(document.getElementById("vol"+i).value);
  const r = await api('set_volume', {pump:i, value:v});
  if(r.error) toast("P"+(i+1)+": "+r.error,"error");
  else { toast("P"+(i+1)+": volume set","success"); log("P"+(i+1)+" volume="+v+"mL"); }
}
async function doRun(i) {
  const r = await api('run', {pump:i});
  if(r.error) toast("P"+(i+1)+": "+r.error,"error");
  else { toast("P"+(i+1)+": running","success"); log("P"+(i+1)+" RUN"); }
}
async function doStop(i) {
  const r = await api('stop', {pump:i});
  if(r.error) toast("P"+(i+1)+": "+r.error,"error");
  else { toast("P"+(i+1)+": stopped"); log("P"+(i+1)+" STOP"); }
}
async function clrVol(i) {
  const r = await api('clear_volume', {pump:i});
  if(r.error) toast("P"+(i+1)+": "+r.error,"error");
  else toast("P"+(i+1)+": vol cleared","success");
}
async function clrTgt(i) {
  const r = await api('clear_target', {pump:i});
  if(r.error) toast("P"+(i+1)+": "+r.error,"error");
  else toast("P"+(i+1)+": target cleared","success");
}
async function doStatus(i) {
  const r = await api('status', {pump:i});
  if(r.error) toast("P"+(i+1)+": "+r.error,"error");
  else { toast("P"+(i+1)+": "+r.response); log("P"+(i+1)+" status: "+r.response); }
}

/* ── protocol ── */
function protoRender(i) {
  const tbody = document.getElementById("protoBody"+i);
  const empty = document.getElementById("protoEmpty"+i);
  tbody.innerHTML = "";
  if(!pumps[i].steps.length){ empty.style.display=""; return; }
  empty.style.display = "none";
  pumps[i].steps.forEach((s,j) => {
    const cls = j===pumps[i].selRow ? "selected" : "";
    tbody.innerHTML += `<tr class="${cls}" onclick="protoSelect(${i},${j})">
      <td><span class="tag ${s.action==='Run'?'tag-run':'tag-stop'}">${s.action}</span></td>
      <td>${s.rate||""}</td><td>${s.units||""}</td><td>${s.time}</td></tr>`;
  });
}
function protoSelect(i,j) {
  pumps[i].selRow = pumps[i].selRow===j ? -1 : j;
  protoRender(i);
}
function protoAdd(i) {
  const action = document.getElementById("pAct"+i).value;
  let rate = document.getElementById("pRate"+i).value||"";
  let units = document.getElementById("pU"+i).value;
  const hh = parseInt(document.getElementById("pHH"+i).value)||0;
  const mm = parseInt(document.getElementById("pMM"+i).value)||0;
  const ss = parseInt(document.getElementById("pSS"+i).value)||0;
  const time = pad2(hh)+":"+pad2(mm)+":"+pad2(ss);
  if(action==="Run" && !rate){ toast("Enter a rate","error"); return; }
  if(action!=="Run"){ rate=""; units=""; }
  pumps[i].steps.push({action, rate, units, time});
  protoRender(i);
}
function protoRemove(i) {
  const s = pumps[i].selRow;
  if(s<0||s>=pumps[i].steps.length) return;
  pumps[i].steps.splice(s,1);
  pumps[i].selRow = -1;
  protoRender(i);
}

async function protoRun(i) {
  if(!pumps[i].connected){ toast("Connect pump first","error"); return; }
  if(!pumps[i].steps.length){ toast("Protocol empty","error"); return; }
  const r = await api('proto_run', {pump:i, steps:pumps[i].steps});
  if(r.error){ toast("P"+(i+1)+": "+r.error,"error"); return; }
  pumps[i].protoRunning = true;
  document.getElementById("protoRun"+i).disabled = true;
  document.getElementById("protoStop"+i).disabled = false;
  log("P"+(i+1)+" protocol started");
}
async function protoStop(i) {
  await api('proto_stop', {pump:i});
  pumps[i].protoRunning = false;
  document.getElementById("protoRun"+i).disabled = false;
  document.getElementById("protoStop"+i).disabled = true;
  log("P"+(i+1)+" protocol stopped");
}

function protoSave(i) {
  if(!pumps[i].steps.length){ toast("Nothing to save","error"); return; }
  const blob = new Blob([JSON.stringify(pumps[i].steps, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = "pump"+(i+1)+"_protocol.json"; a.click();
  toast("Protocol saved","success");
}
function protoLoad(i) {
  const inp = document.createElement("input"); inp.type="file"; inp.accept=".json";
  inp.onchange = function(){
    const rd = new FileReader();
    rd.onload = function(e){
      try {
        pumps[i].steps = JSON.parse(e.target.result);
        pumps[i].selRow = -1;
        protoRender(i);
        toast("Protocol loaded","success");
      } catch(er){ toast("Invalid JSON","error"); }
    };
    rd.readAsText(inp.files[0]);
  };
  inp.click();
}

/* ── event polling (only frequent when a protocol is running) ── */
let _lastEventId = 0;
let _pollTimer = null;

function anyProtoRunning() {
  return pumps.some(p => p.protoRunning);
}

async function pollEvents() {
  try {
    const r = await fetch('/api/events?since=' + _lastEventId);
    const events = await r.json();
    for(const evt of events) {
      _lastEventId = Math.max(_lastEventId, evt.id);
      if(evt.name === "proto_update") {
        const [idx, step, status, msg] = evt.args;
        document.getElementById("protoStat"+idx).textContent = msg;
        log(msg);
        if(status==="complete"||status==="aborted"||status==="error") {
          pumps[idx].protoRunning = false;
          document.getElementById("protoRun"+idx).disabled = false;
          document.getElementById("protoStop"+idx).disabled = true;
          highlightStep(idx, -1);
          toast(msg, status==="error"?"error":"success");
        } else {
          highlightStep(idx, step);
        }
      } else if(evt.name === "proto_countdown") {
        const [idx, step, remaining] = evt.args;
        document.getElementById("protoStat"+idx).textContent =
          "Step "+(step+1)+" — "+remaining+" remaining";
        highlightStep(idx, step);
      }
    }
  } catch(e){}
  schedulePoll();
}

function schedulePoll() {
  const delay = anyProtoRunning() ? 500 : 5000;
  _pollTimer = setTimeout(pollEvents, delay);
}

schedulePoll();

function highlightStep(idx, stepIdx) {
  const rows = document.getElementById("protoBody"+idx).children;
  for(let r=0;r<rows.length;r++) rows[r].classList.toggle("active", r===stepIdx);
}

/* ── init ── */
buildPumps();
refreshPorts();
log("Syringe Pump Control ready");
</script>
